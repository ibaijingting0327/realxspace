*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{

.wrap{max-width:1040px;margin:0 auto}
header{padding:44px 0 8px}
.signal{display:inline-flex;gap:7px;margin-bottom:14px}
.signal span{width:12px;height:12px;border-radius:50%}

.signal .b{background:var(--go)}

nav a{

section{

.sec-head{display:flex;align-items:baseline;gap:10px;margin-bottom:2px}
.sec-num{font-family:var(--mono);font-size:13px;color:var(--ink-3)}
h2{font-size:18px;font-weight:600}
.sec-desc{color:var(--ink-2);font-size:13.5px;margin:2px 0 16px}
button{

button:hover{background:var(--bg);border-color:var(--ink-3)}

button:focus-visible,#pad:focus-visible{outline:2px solid var(--go);outline-offset:2px}

#od-stage{height:auto;min-height:300px;padding:22px 0}

footer{color:var(--ink-3);font-size:12.5px;margin-top:28px;line-height:1.8}

@media (max-width:480px){

@media (prefers-reduced-motion:reduce){

}
</style>
</head>

<script>
(function(){
"use strict";
var LS_OK=true;
try{localStorage.setItem("__t","1");localStorage.removeItem("__t");}catch(e){LS_OK=false;}
function load(k,d){if(!LS_OK)return d;try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function save(k,v){if(!LS_OK)return;try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim();}

/* ---------- 01 鍙嶅簲鍔?---------- */
var pad=document.getElementById("pad"),
    padMain=document.getElementById("pad-main"),
    padSub=document.getElementById("pad-sub"),
    rLast=document.getElementById("r-last"),
    rBest=document.getElementById("r-best"),
    rAvg=document.getElementById("r-avg"),
    rGrade=document.getElementById("r-grade");
var rState="idle",rTO=null,rT0=0;
var rHist=load("rt_hist",[]);
var rBestVal=load("rt_best",null);

function rRender(){
  if(rBestVal!==null)rBest.textContent=rBestVal;
  if(rHist.length){
    rLast.textContent=rHist[rHist.length-1];
    var sum=0;for(var i=0;i<rHist.length;i++)sum+=rHist[i];
    rAvg.textContent=Math.round(sum/rHist.length);
  }
}
function gradeOf(ms){
  if(ms<200)return"鈿?"+ms+" ms 鈥?鐢电珵绾у弽搴?浠婂ぉ鐘舵€佸緢鐚?;
  if(ms<250)return ms+" ms 鈥?浼樼,鑴戝瓙鍦ㄧ嚎";
  if(ms<320)return ms+" ms 鈥?姝ｅ父姘村钩,绋充綇";
  return ms+" ms 鈥?鏈夌偣杩熼挐浜?璧锋潵鎺ユ澂姘村惂";
}
function rGo(){
  if(rState==="idle"||rState==="result"||rState==="early"){
    rState="waiting";
    pad.className="wait";
    padMain.className="";padMain.textContent="绛夊緟鍙樼豢鈥?;
    padSub.textContent="鍙樼豢鐬棿绔嬪埢鐐瑰嚮";
    rTO=setTimeout(function(){
      rState="ready";rT0=performance.now();
      pad.className="go";
      padMain.textContent="鐐?";padSub.textContent="";
    },1000+Math.random()*2600);
  }else if(rState==="waiting"){
    clearTimeout(rTO);rState="early";
    pad.className="early";
    padMain.textContent="鎶㈣窇浜?;padSub.textContent="鐐瑰嚮鍐嶈瘯涓€娆?;
  }else if(rState==="ready"){
    var dt=Math.round(performance.now()-rT0);
    rState="result";
    pad.className="";
    padMain.className="num";padMain.textContent=dt+" ms";
    padSub.textContent="鐐瑰嚮鍐嶆潵涓€娆?;
    rHist.push(dt);if(rHist.length>10)rHist=rHist.slice(-10);
    if(rBestVal===null||dt<rBestVal)rBestVal=dt;
    save("rt_hist",rHist);save("rt_best",rBestVal);
    rGrade.textContent=gradeOf(dt);
    rRender();
  }
}
pad.addEventListener("pointerdown",function(e){e.preventDefault();rGo();});
pad.addEventListener("keydown",function(e){
  if(e.code==="Space"||e.code==="Enter"){e.preventDefault();rGo();}
});

});

/* ---------- 02 鑸掑皵鐗规柟鏍?---------- */
var grid=document.getElementById("grid"),
    sTime=document.getElementById("s-time"),
    sBestEl=document.getElementById("s-best"),
    sMsg=document.getElementById("s-msg"),
    sizeBtns=document.querySelectorAll("#schulte .grp button");
var sSize=5,sNext=1,sT0=null,sInt=null;
var sBest=load("schulte_best",{});

function sBestShow(){
  var b=sBest[sSize];
  sBestEl.textContent=b?b.toFixed(1)+" 绉?:"鈥?;
}
function sBuild(){
  clearInterval(sInt);sInt=null;sT0=null;sNext=1;
  sTime.textContent="0.0";sMsg.textContent="";sMsg.className="";
  var n=sSize*sSize,nums=[];
  for(var i=1;i<=n;i++)nums.push(i);
  for(var j=nums.length-1;j>0;j--){
    var k=Math.floor(Math.random()*(j+1)),t=nums[j];nums[j]=nums[k];nums[k]=t;
  }
  grid.style.gridTemplateColumns="repeat("+sSize+",minmax(0,1fr))";
  grid.style.maxWidth=(sSize*92)+"px";
  grid.innerHTML="";
  nums.forEach(function(num){
    var b=document.createElement("button");
    b.textContent=num;
    b.addEventListener("click",function(){
      if(b.classList.contains("done"))return;
      if(num!==sNext){
        b.classList.add("wrong");
        setTimeout(function(){b.classList.remove("wrong");},280);
        return;
      }
      if(sNext===1){
        sT0=performance.now();
        sInt=setInterval(function(){
          sTime.textContent=((performance.now()-sT0)/1000).toFixed(1);
        },100);
      }
      b.classList.add("done");
      sNext++;
      if(sNext>sSize*sSize){
        clearInterval(sInt);sInt=null;
        var sec=(performance.now()-sT0)/1000;
        sTime.textContent=sec.toFixed(1);
        var isBest=!sBest[sSize]||sec<sBest[sSize];
        if(isBest){sBest[sSize]=Math.round(sec*10)/10;save("schulte_best",sBest);}
        sBestShow();
        var good=sSize===5?30:(sSize===4?18:8);
        sMsg.className="ok";
        sMsg.textContent="瀹屾垚!"+sec.toFixed(1)+" 绉?
          +(isBest?" 路 鏂扮邯褰?:"")
          +(sec<=good?" 路 涓撴敞鍔涘湪绾?:" 路 澶氱粌鍑犳浼氭洿蹇?);
      }
    });
    grid.appendChild(b);
  });
}
sizeBtns.forEach(function(btn){
  btn.addEventListener("click",function(){
    sizeBtns.forEach(function(b){b.setAttribute("aria-pressed","false");});
    btn.setAttribute("aria-pressed","true");
    sSize=parseInt(btn.dataset.size,10);
    sBestShow();sBuild();
  });
});
document.getElementById("s-reset").addEventListener("click",sBuild);
sBestShow();sBuild();

/* ---------- 03 Stroop 鑹茶瘝 ---------- */
var stStart=document.getElementById("st-start"),
    stWord=document.getElementById("st-word"),
    stMsg=document.getElementById("st-msg"),
    stHud=document.getElementById("st-hud"),
    stGrade=document.getElementById("st-grade"),
    stBestEl=document.getElementById("st-best"),
    stBtns=document.querySelectorAll(".st-answers button");
var ST_WORDS=["绾?,"缁?,"钃?,"榛?];
var stOn=false,stAns=-1,stOK=0,stAll=0,stEnd=0,stTick=null;
var stBest=load("stroop_best",null);
if(stBest!==null)stBestEl.textContent=stBest;

function stNext(){
  var w=Math.floor(Math.random()*4),c;
  if(Math.random()<0.72){do{c=Math.floor(Math.random()*4);}while(c===w);}
  else c=w;
  stAns=c;
  var colors=[cssVar("--stop"),cssVar("--go"),cssVar("--blue"),cssVar("--wait")];
  stWord.textContent=ST_WORDS[w];
  stWord.style.color=colors[c];
}
function stFinish(){
  stOn=false;clearInterval(stTick);stTick=null;
  stWord.style.display="none";stMsg.style.display="block";stHud.textContent="";
  var acc=stAll?Math.round(stOK/stAll*100):0;
  var isBest=stBest===null||stOK>stBest;
  if(isBest&&stAll>0){stBest=stOK;save("stroop_best",stBest);stBestEl.textContent=stBest;}
  stMsg.innerHTML='<span class="big">'+stOK+' 棰?/span>姝ｇ‘鐜?'+acc+'%'+(isBest&&stAll>0?" 路 鏂扮邯褰?:"");
  stGrade.textContent=stOK>=25?"鎶楀共鎵拌兘鍔涙媺婊?澶ц剳娌″湪鑷姩椹鹃┒":
                      stOK>=18?"涓嶉敊,鍓嶉鍙堕啋鐫€鍛?:
                      stAll>0?"瀛椾箟鐨勫共鎵颁笉灏忓惂?澶氱粌鍑犺疆灏遍『浜?:"";
}
stStart.addEventListener("click",function(){
  stOn=true;stOK=0;stAll=0;stGrade.textContent="";
  stMsg.style.display="none";stWord.style.display="block";
  stEnd=performance.now()+30000;
  stHud.textContent="30.0 s 路 0 瀵?;
  stTick=setInterval(function(){
    var left=(stEnd-performance.now())/1000;
    if(left<=0){stFinish();return;}
    stHud.textContent=left.toFixed(1)+" s 路 "+stOK+" 瀵?;
  },100);
  stNext();
});
function stPick(c){
  if(!stOn)return;
  stAll++;
  if(c===stAns)stOK++;
  stNext();
}
stBtns.forEach(function(b){
  b.addEventListener("click",function(){stPick(parseInt(b.dataset.c,10));});
});
document.addEventListener("keydown",function(e){
  if(!stOn||document.activeElement.tagName==="INPUT")return;
  var i="1234".indexOf(e.key);

/* ---------- 04 鏁板瓧璁板繂骞垮害 ---------- */
var mStart=document.getElementById("m-start"),
    mMsg=document.getElementById("m-msg"),
    mDigits=document.getElementById("m-digits"),
    mRow=document.getElementById("m-input-row"),
    mInput=document.getElementById("m-input"),
    mSubmit=document.getElementById("m-submit"),
    mLenEl=document.getElementById("m-len"),
    mBestEl=document.getElementById("m-best");
var mLen=3,mSeq="",mTOs=[],mPhase="idle";
var mBest=load("span_best",null);
if(mBest!==null)mBestEl.textContent=mBest;

function mClearTOs(){mTOs.forEach(clearTimeout);mTOs=[];}
function mShow(el){
  [mMsg,mDigits,mRow].forEach(function(x){x.style.display="none";});
  el.style.display=el===mRow?"flex":"block";
}
function mRound(){
  mPhase="show";mLenEl.textContent=mLen;
  mSeq="";
  for(var i=0;i<mLen;i++){
    var d;
    do{d=String(Math.floor(Math.random()*10));}while(i>0&&d===mSeq[i-1]);
    mSeq+=d;
  }
  mShow(mDigits);mDigits.textContent="";
  var t=400;
  for(var j=0;j<mSeq.length;j++){
    (function(ch){
      mTOs.push(setTimeout(function(){mDigits.textContent=ch;},t));
      mTOs.push(setTimeout(function(){mDigits.textContent="";},t+620));
    })(mSeq[j]);
    t+=800;
  }
  mTOs.push(setTimeout(function(){
    mPhase="input";
    mShow(mRow);mInput.value="";mInput.focus();
  },t+150));
}
function mCheck(){
  if(mPhase!=="input")return;
  var v=mInput.value.replace(/\D/g,"");
  if(v===mSeq){
    mLen++;
    mPhase="gap";
    mShow(mMsg);
    mMsg.innerHTML='<span class="ok">姝ｇ‘!</span>涓嬩竴杞?'+mLen+' 浣?鍑嗗鈥?;
    mTOs.push(setTimeout(mRound,1100));
  }else{
    mPhase="idle";
    var reached=mLen-1;
    var isBest=reached>=3&&(mBest===null||reached>mBest);
    if(isBest){mBest=reached;save("span_best",mBest);mBestEl.textContent=mBest;}
    mShow(mMsg);
    mMsg.innerHTML='<span class="big">'+reached+' 浣?/span>姝ｇ‘绛旀鏄?'+mSeq
      +(isBest?" 路 鏂扮邯褰?:"")
      +(reached>=8?" 路 璁板繂鍔涙儕浜?:reached>=6?" 路 杈惧埌鏅€氫汉姘村钩绾夸互涓?:" 路 鍐嶆垬涓€灞€?");
    mLenEl.textContent="鈥?;
  }
}
mStart.addEventListener("click",function(){
  mClearTOs();mLen=3;mRound();
});
mSubmit.addEventListener("click",mCheck);
mInput.addEventListener("keydown",function(e){
  if(e.key==="Enter"){e.preventDefault();mCheck();}
});

/* ---------- 06 搴忓垪璁板繂 ---------- */
var simTiles=document.querySelectorAll("#sim-grid button"),
    simStart=document.getElementById("sim-start"),
    simRound=document.getElementById("sim-round"),
    simBestEl=document.getElementById("sim-best"),
    simMsg=document.getElementById("sim-msg");
var simSeq=[],simPos=0,simPhase="idle",simTOs=[];
var simBest=load("simon_best",null);
if(simBest!==null)simBestEl.textContent=simBest;

function simClear(){simTOs.forEach(clearTimeout);simTOs=[];}
function simFlash(i,d){
  simTiles[i].classList.add("lit");
  setTimeout(function(){simTiles[i].classList.remove("lit");},d||360);
}
function simPlay(){
  simPhase="show";
  simRound.textContent=simSeq.length;
  simMsg.textContent="璁颁綇椤哄簭鈥?;
  simSeq.forEach(function(v,idx){
    simTOs.push(setTimeout(function(){simFlash(v);},500+idx*620));
  });
  simTOs.push(setTimeout(function(){
    simPhase="input";simPos=0;
    simMsg.textContent="杞埌浣犱簡";
  },500+simSeq.length*620));
}
simStart.addEventListener("click",function(){
  simClear();
  simSeq=[Math.floor(Math.random()*4)];
  simPlay();
});
simTiles.forEach(function(t){
  t.addEventListener("click",function(){
    if(simPhase!=="input")return;
    var i=parseInt(t.dataset.i,10);
    simFlash(i,200);
    if(i===simSeq[simPos]){
      simPos++;
      if(simPos===simSeq.length){
        simPhase="gap";
        simMsg.textContent="姝ｇ‘!涓嬩竴杞€?;
        simTOs.push(setTimeout(function(){
          simSeq.push(Math.floor(Math.random()*4));
          simPlay();
        },900));
      }
    }else{
      simPhase="idle";
      var score=simSeq.length-1;
      var isBest=score>0&&(simBest===null||score>simBest);
      if(isBest){simBest=score;save("simon_best",simBest);simBestEl.textContent=simBest;}
      simMsg.textContent="姝㈡ "+score+" 浣?+(isBest?" 路 鏂扮邯褰?:"")
        +(score>=8?" 路 椤哄簭璁板繂寰堣兘鎵?:score>=5?" 路 姝ｅ父鍙戞尌,鍐嶆潵涓€灞€":" 路 鐑韩灞€,涓嶇畻");
      simRound.textContent="鈥?;
    }
  });
});

/* ---------- 07 鐏溂閲戠潧 ---------- */
var odStart=document.getElementById("od-start"),
    odStage=document.getElementById("od-stage"),
    odGrid=document.getElementById("od-grid"),
    odMsg=document.getElementById("od-msg"),
    odHud=document.getElementById("od-hud"),
    odGrade=document.getElementById("od-grade"),
    odBestEl=document.getElementById("od-best");
var odOn=false,odLvl=1,odEnd=0,odTick=null;
var odBest=load("odd_best",null);
if(odBest!==null)odBestEl.textContent=odBest;

function odBuild(){
  var n=Math.min(2+Math.floor((odLvl-1)/2),6);
  var hue=Math.floor(Math.random()*360),
      sat=55+Math.floor(Math.random()*15),
      light=46+Math.floor(Math.random()*10),
      delta=Math.max(7,26-odLvl*1.6);
  if(hue>40&&hue<180)delta*=1.5;
  delta=Math.round(delta);
  var sign=light>52?-1:1,
      oddIdx=Math.floor(Math.random()*n*n);
  odGrid.style.gridTemplateColumns="repeat("+n+",minmax(0,1fr))";
  odGrid.style.maxWidth=Math.min(n*76,520)+"px";
  odGrid.innerHTML="";
  for(var i=0;i<n*n;i++){
    (function(idx){
      var b=document.createElement("button");
      var l=idx===oddIdx?light+sign*delta:light;
      b.style.background="hsl("+hue+" "+sat+"% "+l+"%)";
      b.setAttribute("aria-label",idx===oddIdx?"涓嶅悓鐨勮壊鍧?:"鑹插潡");
      b.addEventListener("pointerdown",function(e){
        if(!odOn)return;
        e.preventDefault();
        if(idx===oddIdx){odLvl++;odBuild();}
        else{
          b.classList.add("oops");
          setTimeout(function(){b.classList.remove("oops");},250);
        }
      });
      odGrid.appendChild(b);
    })(i);
  }
}
function odFinish(){
  odOn=false;clearInterval(odTick);odTick=null;
  odGrid.style.display="none";odMsg.style.display="block";odHud.textContent="";
  var cleared=odLvl-1;
  var isBest=cleared>0&&(odBest===null||cleared>odBest);
  if(isBest){odBest=cleared;save("odd_best",odBest);odBestEl.textContent=odBest;}
  odMsg.innerHTML='<span class="big">'+cleared+' 鍏?/span>'+(isBest?"鏂扮邯褰?:"鏃堕棿鍒?);
  odGrade.textContent=cleared>=14?"鍍忕礌鐪艰璇?璁捐甯堢湅浜嗛兘鐐瑰ご":
                      cleared>=9?"鑹插僵鏁忔劅搴﹀湪绾?:
                      cleared>0?"鍚庨潰鑹插樊寰堝皬,姝ｅ父,澶氱粌":"";
}
odStart.addEventListener("click",function(){
  odOn=true;odLvl=1;odGrade.textContent="";
  odMsg.style.display="none";odGrid.style.display="grid";
  odEnd=performance.now()+30000;
  odHud.textContent="30.0 s 路 绗?1 鍏?;
  odTick=setInterval(function(){
    var left=(odEnd-performance.now())/1000;
    if(left<=0){odFinish();return;}
    odHud.textContent=left.toFixed(1)+" s 路 绗?"+odLvl+" 鍏?;
  },100);
  odBuild();
});

/* ---------- 08 蹇冪畻鍐插埡 ---------- */
var mmStart=document.getElementById("mm-start"),
    mmQ=document.getElementById("mm-q"),
    mmMsg=document.getElementById("mm-msg"),
    mmHud=document.getElementById("mm-hud"),
    mmGrade=document.getElementById("mm-grade"),
    mmBestEl=document.getElementById("mm-best"),
    mmBtns=document.querySelectorAll("#mm-opts button");
var mmOn=false,mmOK=0,mmAll=0,mmAns=0,mmEnd=0,mmTick=null;
var mmBest=load("math_best",null);
if(mmBest!==null)mmBestEl.textContent=mmBest;

function ri(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function mmNext(){
  var op=Math.floor(Math.random()*3),a,b,ans,txt;
  if(op===0){a=ri(6,59);b=ri(6,59);ans=a+b;txt=a+" + "+b;}
  else if(op===1){a=ri(15,89);b=ri(4,a-3);ans=a-b;txt=a+" 鈭?"+b;}
  else{a=ri(3,12);b=ri(3,12);ans=a*b;txt=a+" 脳 "+b;}
  mmAns=ans;
  mmQ.textContent=txt+" = ?";
  var opts=[ans],guard=0;
  while(opts.length<4&&guard<60){
    guard++;
    var d=ans+(Math.random()<0.5?-1:1)*ri(1,10);
    if(d>=0&&opts.indexOf(d)===-1)opts.push(d);
  }
  for(var j=opts.length-1;j>0;j--){
    var k=Math.floor(Math.random()*(j+1)),t=opts[j];opts[j]=opts[k];opts[k]=t;
  }
  mmBtns.forEach(function(btn,i){btn.textContent=opts[i];});
}
function mmFinish(){
  mmOn=false;clearInterval(mmTick);mmTick=null;
  mmQ.style.display="none";mmMsg.style.display="block";mmHud.textContent="";
  mmBtns.forEach(function(btn){btn.textContent="鈥?;});
  var acc=mmAll?Math.round(mmOK/mmAll*100):0;
  var isBest=mmAll>0&&(mmBest===null||mmOK>mmBest);
  if(isBest){mmBest=mmOK;save("math_best",mmBest);mmBestEl.textContent=mmBest;}
  mmMsg.innerHTML='<span class="big">'+mmOK+' 棰?/span>姝ｇ‘鐜?'+acc+'%'+(isBest?" 路 鏂扮邯褰?:"");
  mmGrade.textContent=mmOK>=18?"蹇冪畻寮曟搸婊¤浆,鎶ラ攢鍗曞彲浠ュ彛绠椾簡":
                      mmOK>=12?"涓嶉敊,鏁板瓧鑴戦啋鐫€":
                      mmAll>0?"鎱㈠嵆鏄ǔ,鍏堜繚姝ｇ‘鐜囧啀鎻愰€?:"";
}
mmStart.addEventListener("click",function(){
  mmOn=true;mmOK=0;mmAll=0;mmGrade.textContent="";
  mmMsg.style.display="none";mmQ.style.display="block";
  mmEnd=performance.now()+30000;
  mmHud.textContent="30.0 s 路 0 瀵?;
  mmTick=setInterval(function(){
    var left=(mmEnd-performance.now())/1000;
    if(left<=0){mmFinish();return;}
    mmHud.textContent=left.toFixed(1)+" s 路 "+mmOK+" 瀵?;
  },100);
  mmNext();
});
function mmPick(i){
  if(!mmOn)return;
  mmAll++;
  if(parseInt(mmBtns[i].textContent,10)===mmAns)mmOK++;
  mmNext();
}
mmBtns.forEach(function(btn,i){
  btn.addEventListener("click",function(){mmPick(i);});
});
document.addEventListener("keydown",function(e){
  if(!mmOn||document.activeElement.tagName==="INPUT")return;
  var i="1234".indexOf(e.key);
  if(i>-1){e.preventDefault();mmPick(i);}
});

/* ---------- 09 缈荤墝閰嶅 ---------- */
var pGrid=document.getElementById("p-grid"),
    pMovesEl=document.getElementById("p-moves"),
    pTimeEl=document.getElementById("p-time"),
    pBestEl=document.getElementById("p-best"),
    pMsg=document.getElementById("p-msg");
var P_SYMS=["馃崁","馃寵","鈿?,"馃崕","馃帶","馃殌","馃悷","馃敟"];
var pFirst=null,pLock=false,pMoves=0,pMatched=0,pT0=null,pInt=null;
var pBest=load("pairs_best",null);
if(pBest!==null)pBestEl.textContent=pBest.toFixed(1)+" 绉?;

function pBuild(){
  clearInterval(pInt);pInt=null;pT0=null;
  pFirst=null;pLock=false;pMoves=0;pMatched=0;
  pMovesEl.textContent="0";pTimeEl.textContent="0.0";
  pMsg.textContent="";pMsg.className="grade";
  var deck=P_SYMS.concat(P_SYMS);
  for(var j=deck.length-1;j>0;j--){
    var k=Math.floor(Math.random()*(j+1)),t=deck[j];deck[j]=deck[k];deck[k]=t;
  }
  pGrid.innerHTML="";
  deck.forEach(function(sym){
    var b=document.createElement("button");
    b.dataset.sym=sym;
    b.innerHTML='<span class="q">?</span>';
    b.setAttribute("aria-label","鐩栫潃鐨勭墝");
    b.addEventListener("click",function(){
      if(pLock||b===pFirst||b.classList.contains("hit"))return;
      if(!pT0){
        pT0=performance.now();
        pInt=setInterval(function(){
          pTimeEl.textContent=((performance.now()-pT0)/1000).toFixed(1);
        },100);
      }
      b.textContent=sym;b.classList.add("flip");
      if(!pFirst){pFirst=b;return;}
      pMoves++;pMovesEl.textContent=pMoves;
      var a=pFirst;
      if(a.dataset.sym===sym){
        a.classList.remove("flip");b.classList.remove("flip");
        a.classList.add("hit");b.classList.add("hit");
        pFirst=null;pMatched++;
        if(pMatched===P_SYMS.length){
          clearInterval(pInt);pInt=null;
          var sec=(performance.now()-pT0)/1000;
          pTimeEl.textContent=sec.toFixed(1);
          var isBest=pBest===null||sec<pBest;
          if(isBest){pBest=Math.round(sec*10)/10;save("pairs_best",pBest);pBestEl.textContent=pBest.toFixed(1)+" 绉?;}
          pMsg.className="grade";
          pMsg.textContent="瀹屾垚!"+pMoves+" 姝?路 "+sec.toFixed(1)+" 绉?
            +(isBest?" 路 鏂扮邯褰?:"")
            +(pMoves<=12?" 路 璁板繂瀹浣忔埛":pMoves<=18?" 路 鐭椂璁板繂鍦ㄧ嚎":" 路 鍐嶆潵涓€灞€缁冪粌");
        }
      }else{
        pLock=true;
        setTimeout(function(){
          a.innerHTML='<span class="q">?</span>';b.innerHTML='<span class="q">?</span>';
          a.classList.remove("flip");b.classList.remove("flip");
          pFirst=null;pLock=false;
        },680);
      }
    });
    pGrid.appendChild(b);
  });
}
document.getElementById("p-reset").addEventListener("click",pBuild);
pBuild();

var eStage=document.getElementById("e-stage"),
    eMsg=document.getElementById("e-msg"),
    ball=document.getElementById("ball");
var eInt=null,eRAF=null;
function eStop(msg){
  clearInterval(eInt);eInt=null;
  if(eRAF)cancelAnimationFrame(eRAF);eRAF=null;
  ball.style.display="none";
  eMsg.style.display="block";
  if(msg)eMsg.innerHTML=msg;
}
document.getElementById("e-far").addEventListener("click",function(){
  eStop();
  var left=20;
  function tick(){
    eMsg.innerHTML='<span class="big">'+left+'</span>鏈涘悜 6 绫冲,璁╃潾鐘惰倢鏀炬澗';
  }
  tick();
  eInt=setInterval(function(){
    left--;
    if(left<=0){eStop('<span class="ok">鐪肩潧鍏呭ソ鐢典簡,缁х画鎼爾</span>');return;}
    tick();
  },1000);
});
document.getElementById("e-track").addEventListener("click",function(){
  eStop();
  eMsg.style.display="none";
  ball.style.display="block";
  var t0=performance.now();
  function step(now){
    var t=(now-t0)/1000;
    if(t>=30){eStop('<span class="ok">杩借釜瀹屾垚,闂溂鐪ㄧ溂鍚勪笁娆?/span>');return;}
    var W=eStage.clientWidth,H=eStage.clientHeight,a=t*0.9;
    var x=W/2+(W/2-32)*Math.sin(a);
    var y=H/2+(H/2-28)*Math.sin(a*2)*0.82;
    ball.style.left=Math.round(x-12)+"px";
    ball.style.top=Math.round(y-12)+"px";
    eRAF=requestAnimationFrame(step);
  }
  eRAF=requestAnimationFrame(step);
});
document.getElementById("e-stop").addEventListener("click",function(){
  eStop("閫変竴涓ā寮忓紑濮嬨€傝繙鐪烘椂璇风寮€灞忓箷,鏈涘悜绐楀鏈€杩滅殑鍦版柟銆?);
});
})();
